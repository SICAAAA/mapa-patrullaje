<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Patrullaje</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 500px;
    }

    .panel {
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }

    select {
      padding: 6px;
      min-width: 200px;
    }

    .mensaje {
      padding: 8px 10px;
      background: #fff3cd;
      border: 1px solid #ffe69c;
      color: #664d03;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="panel">
    <label for="patrullajeSelect">Patrullaje:</label>
    <select id="patrullajeSelect"></select>
    <div id="mensaje" class="mensaje"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const data = {
      patrullajes: [
        {
          id: "PAT-001",
          puntos: [
            { orden: 1, lat: -33.041325, lng: -71.623469 },
            { orden: 2, lat: -33.041219, lng: -71.623314 },
            { orden: 3, lat: -33.041558, lng: -71.623328 }
            // { orden: 4, lat: -33.041567, lng: -71.623097 }
          ]
        },
        {
          id: "PAT-002",
          puntos: [
            { orden: 1, lat: -33.042000, lng: -71.624000 },
            { orden: 2, lat: -33.042300, lng: -71.623700 },
            { orden: 3, lat: -33.042700, lng: -71.623200 }
          ]
        }
      ]
    };

    const map = L.map('map').setView([-33.041325, -71.623469], 16);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const select = document.getElementById('patrullajeSelect');
    const mensaje = document.getElementById('mensaje');

    let rutaActual = null;
    let marcadoresActuales = [];

    // Leer el parámetro de la URL
    // Ejemplo esperado:
    // ?patrullaje=PAT-001
    const params = new URLSearchParams(window.location.search);
    const patrullajeDesdeURL = params.get('patrullaje');

    function mostrarMensaje(texto) {
      mensaje.textContent = texto;
      mensaje.style.display = 'block';
    }

    function ocultarMensaje() {
      mensaje.textContent = '';
      mensaje.style.display = 'none';
    }

    function poblarSelector() {
      select.innerHTML = '';

      data.patrullajes.forEach(p => {
        const option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.id;
        select.appendChild(option);
      });
    }

    function limpiarMapa() {
      if (rutaActual) {
        map.removeLayer(rutaActual);
        rutaActual = null;
      }

      marcadoresActuales.forEach(m => map.removeLayer(m));
      marcadoresActuales = [];
    }

    function dibujarPatrullaje(idPatrullaje) {
      limpiarMapa();
      ocultarMensaje();

      const patrullaje = data.patrullajes.find(p => p.id === idPatrullaje);

      if (!patrullaje) {
        mostrarMensaje(`No se encontró el patrullaje "${idPatrullaje}" en los datos.`);
        return;
      }

      if (!patrullaje.puntos || patrullaje.puntos.length === 0) {
        mostrarMensaje(`El patrullaje "${idPatrullaje}" no tiene puntos para mostrar.`);
        return;
      }

      const puntosOrdenados = [...patrullaje.puntos].sort((a, b) => a.orden - b.orden);
      const coordenadas = puntosOrdenados.map(p => [p.lat, p.lng]);

      rutaActual = L.polyline(coordenadas).addTo(map);

      puntosOrdenados.forEach((p, index) => {
        let texto = `Orden: ${p.orden}`;

        if (index === 0) {
          texto = `Inicio<br>${texto}`;
        } else if (index === puntosOrdenados.length - 1) {
          texto = `Fin<br>${texto}`;
        }

        const marcador = L.marker([p.lat, p.lng])
          .addTo(map)
          .bindPopup(texto)
          .bindTooltip(String(p.orden), {
            permanent: true,
            direction: 'top'
          });

        marcadoresActuales.push(marcador);
      });

      map.fitBounds(rutaActual.getBounds(), { padding: [20, 20] });

      // Sincronizar selector
      select.value = idPatrullaje;
    }

    function inicializarMapa() {
      poblarSelector();

      // Si viene un patrullaje por URL, usarlo
      if (patrullajeDesdeURL) {
        const existe = data.patrullajes.some(p => p.id === patrullajeDesdeURL);

        if (existe) {
          dibujarPatrullaje(patrullajeDesdeURL);
        } else {
          // Si no existe, dibuja el primero y avisa
          dibujarPatrullaje(data.patrullajes[0].id);
          mostrarMensaje(`El parámetro de URL patrullaje="${patrullajeDesdeURL}" no existe en los datos.`);
        }
      } else if (data.patrullajes.length > 0) {
        // Si no viene nada en URL, dibuja el primero
        dibujarPatrullaje(data.patrullajes[0].id);
      }
    }

    select.addEventListener('change', function () {
      dibujarPatrullaje(this.value);
    });

    inicializarMapa();
  </script>
</body>
</html>
