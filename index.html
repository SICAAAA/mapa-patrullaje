<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Patrullaje</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 500px;
    }

    .panel {
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }

    select {
      padding: 6px;
      min-width: 200px;
    }
  </style>
</head>
<body>

  <div class="panel">
    <label for="patrullajeSelect">Patrullaje:</label>
    <select id="patrullajeSelect"></select>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const data = {
      patrullajes: [
        {
          id: "PAT-001",
          puntos: [
            { orden: 1, lat: -33.041325, lng: -71.623469 },
            { orden: 2, lat: -33.041219, lng: -71.623314 },
            { orden: 3, lat: -33.041558, lng: -71.623328 },
            { orden: 4, lat: -33.041567, lng: -71.623097 }
          ]
        },
        {
          id: "PAT-002",
          puntos: [
            { orden: 1, lat: -33.042000, lng: -71.624000 },
            { orden: 2, lat: -33.042300, lng: -71.623700 },
            { orden: 3, lat: -33.042700, lng: -71.623200 }
          ]
        }
      ]
    };

    const map = L.map('map').setView([-33.041325, -71.623469], 16);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const select = document.getElementById('patrullajeSelect');

    let rutaActual = null;
    let marcadoresActuales = [];

    data.patrullajes.forEach(p => {
      const option = document.createElement('option');
      option.value = p.id;
      option.textContent = p.id;
      select.appendChild(option);
    });

    function limpiarMapa() {
      if (rutaActual) {
        map.removeLayer(rutaActual);
      }

      marcadoresActuales.forEach(m => map.removeLayer(m));
      marcadoresActuales = [];
    }

    function dibujarPatrullaje(idPatrullaje) {
      limpiarMapa();

      const patrullaje = data.patrullajes.find(p => p.id === idPatrullaje);
      if (!patrullaje || !patrullaje.puntos.length) return;

      const puntosOrdenados = [...patrullaje.puntos].sort((a, b) => a.orden - b.orden);
      const coordenadas = puntosOrdenados.map(p => [p.lat, p.lng]);

      rutaActual = L.polyline(coordenadas).addTo(map);

      puntosOrdenados.forEach((p, index) => {
        let texto = `Orden: ${p.orden}`;

        if (index === 0) {
          texto = `Inicio<br>${texto}`;
        } else if (index === puntosOrdenados.length - 1) {
          texto = `Fin<br>${texto}`;
        }

        const marcador = L.marker([p.lat, p.lng])
        .addTo(map)
        .bindPopup(texto)
        .bindTooltip(String(p.orden), {
          permanent: true,
          direction: 'top'
        });
        marcadoresActuales.push(marcador);
      });

      map.fitBounds(rutaActual.getBounds());
    }

    select.addEventListener('change', function () {
      dibujarPatrullaje(this.value);
    });

    if (data.patrullajes.length > 0) {
      select.value = data.patrullajes[0].id;
      dibujarPatrullaje(data.patrullajes[0].id);
    }
  </script>
</body>
</html>
